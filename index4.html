<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toppturer Tromsø</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --strava-orange: #fc4c02;
            --insta-pink: #e1306c;
            --dark-grey: #2c3e50;
        }

        body { 
            font-family: -apple-system, sans-serif; 
            text-align: center; margin: 0; padding: 20px 10px; 
            background: #f1f5f9; 
        }

        #buttons { margin-bottom: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        
        .map-selector, #resetBtn, #bratthetBtn { 
            padding: 12px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none;
        }

        .map-selector { border: 2px solid var(--dark-grey); background: white; }

        .top-btn { 
            background: var(--strava-orange); color: white; border: none; 
            padding: 12px 18px; border-radius: 8px; cursor: pointer; font-weight: bold;
        }

        #bratthetBtn { background: white; border: 2px solid #d32f2f; color: #d32f2f; }
        #bratthetBtn.active { background: #d32f2f; color: white; }

        #resetBtn { background: var(--dark-grey); color: white; }

        #map-container { position: relative; max-width: 1100px; margin: 0 auto; }
        #map { height: 600px; width: 100%; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); background: #eee; }

        #insta-overlay-btn {
            position: absolute; top: 20px; right: 20px; z-index: 1000;
            background: white; color: var(--insta-pink); border: 2px solid var(--insta-pink);
            padding: 12px 18px; border-radius: 50px; font-weight: bold; display: none; text-decoration: none;
        }

        #legend {
            margin-top: 15px; display: none; gap: 12px; font-size: 11px;
            background: white; padding: 12px; border-radius: 8px; justify-content: center;
        }
        .legend-item { display: flex; align-items: center; gap: 4px; }
        .box { width: 14px; height: 14px; border: 1px solid #ccc; }

        #last-updated { margin-top: 20px; font-size: 11px; color: #94a3b8; }
    </style>
</head>
<body>

    <h1>Toppturer rundt Tromsø</h1>

    <div id="buttons">
        <select id="mapSelect" class="map-selector">
            <option value="norge">Norgeskart</option>
            <option value="osm">OpenStreetMap</option>
        </select>
        <button id="bratthetBtn">Bratthet: AV</button>
        <button id="resetBtn">Tilbake til oversikt</button>
    </div>

    <div id="map-container">
        <div id="map"></div>
        <a id="insta-overlay-btn" href="#" target="_blank">Se video</a>
    </div>

    <div id="legend">
        <div class="legend-item"><div class="box" style="background: #ffff00;"></div> 30-35°</div>
        <div class="legend-item"><div class="box" style="background: #ffaa00;"></div> 35-40°</div>
        <div class="legend-item"><div class="box" style="background: #ff0000;"></div> 40-45°</div>
        <div class="legend-item"><div class="box" style="background: #aa0000;"></div> 45-50°</div>
        <div class="legend-item"><div class="box" style="background: #000000;"></div> >50°</div>
    </div>

    <div id="last-updated"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>

    <script>
        document.getElementById('last-updated').innerHTML = "Sist oppdatert: " + new Date(document.lastModified).toLocaleString('no-NO');

        const map = L.map('map').setView([69.65, 18.95], 11);
        const tracks = L.featureGroup().addTo(map);

        // 1. Kartverket Topo (Bunn)
        const topoLayer = L.tileLayer('https://cache.kartverket.no/v1/wmts/1.0.0/topo/default/webmercator/{z}/{y}/{x}.png', {
            attribution: '&copy; Kartverket'
        }).addTo(map);

        // 2. Kartverket Bratthet (Dette er det mest stabile alternativet til NVE)
        const slopeLayer = L.tileLayer('https://cache.kartverket.no/v1/wmts/1.0.0/slope/default/webmercator/{z}/{y}/{x}.png', {
            attribution: '&copy; Kartverket',
            opacity: 0.6,
            zIndex: 100
        });

        const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OSM' });

        // Bratthet Toggle
        const bratthetBtn = document.getElementById('bratthetBtn');
        bratthetBtn.onclick = function() {
            if (map.hasLayer(slopeLayer)) {
                map.removeLayer(slopeLayer);
                this.classList.remove('active');
                this.innerText = "Bratthet: AV";
                document.getElementById('legend').style.display = "none";
            } else {
                slopeLayer.addTo(map);
                this.classList.add('active');
                this.innerText = "Bratthet: PÅ";
                document.getElementById('legend').style.display = "flex";
            }
        };

        // Bytte bakgrunn
        document.getElementById('mapSelect').onchange = function() {
            if (this.value === "osm") {
                osmLayer.addTo(map);
                map.removeLayer(topoLayer);
            } else {
                topoLayer.addTo(map);
                map.removeLayer(osmLayer);
            }
        };

        // GPX-filer
        const topper = [
            { navn: "Gråtinden 871", fil: "2026_04_06.gpx", video: "https://www.instagram.com/reel/DW1xhPniK_l/" },
            { navn: "Bentsjordtinden", fil: "2026_04_03.gpx", video: "https://www.instagram.com/barfotgimse/reel/DWr1QGKiLBC/" },
            { navn: "Rema (800) 1000", fil: "2026_03_28.gpx", video: "https://www.instagram.com/barfotgimse/reel/DWcV-W9iLB8/" }
        ];

        topper.forEach(topp => {
            const btn = document.createElement('button');
            btn.className = 'top-btn';
            btn.innerText = topp.navn;
            document.getElementById('buttons').appendChild(btn);

            new L.GPX(topp.fil, {
                async: true,
                marker_options: { startIconUrl: null, endIconUrl: null, shadowUrl: null },
                polyline_options: { color: '#fc4c02', weight: 5 }
            }).on('loaded', function(e) {
                tracks.addLayer(e.target);
                
                const activate = () => {
                    map.flyToBounds(e.target.getBounds(), { padding: [50, 50] });
                    document.getElementById('insta-overlay-btn').href = topp.video;
                    document.getElementById('insta-overlay-btn').style.display = 'block';
                };

                btn.onclick = activate;
                e.target.on('click', activate);
                
                // Start med oversikt
                map.fitBounds(tracks.getBounds(), { padding: [40, 40] });
            });
        });

        document.getElementById('resetBtn').onclick = () => {
            map.flyToBounds(tracks.getBounds(), { padding: [40, 40] });
            document.getElementById('insta-overlay-btn').style.display = 'none';
        };
    </script>
</body>
</html>
