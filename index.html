<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toppturer Tromsø</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --strava-orange: #fc4c02;
            --insta-pink: #e1306c;
            --dark-grey: #2c3e50;
        }

        body { 
            font-family: -apple-system, sans-serif; 
            text-align: center; margin: 0; padding: 20px 10px; 
            background: #f1f5f9; color: var(--dark-grey);
        }

        #buttons { margin-bottom: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; align-items: center; }
        
        .map-selector { padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; border: 2px solid var(--dark-grey); background: white; }

        .top-btn { 
            background: var(--strava-orange); color: white; border: none; 
            padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold;
        }

        #resetBtn { background: var(--dark-grey); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; }

        #map-container { position: relative; max-width: 1100px; margin: 0 auto; }
        #map { height: 600px; width: 100%; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); background-color: #ddd; }

        #legend {
            margin-top: 15px; display: inline-flex; gap: 12px; font-size: 11px;
            background: white; padding: 12px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            justify-content: center; flex-wrap: wrap;
        }
        .legend-item { display: flex; align-items: center; gap: 4px; font-weight: 600; }
        .box { width: 14px; height: 14px; border: 1px solid rgba(0,0,0,0.2); }

        #insta-overlay-btn {
            position: absolute; top: 20px; right: 20px; z-index: 1000;
            background: white; color: var(--insta-pink); border: 2px solid var(--insta-pink);
            padding: 12px 18px; border-radius: 50px; font-weight: bold; display: none; text-decoration: none;
        }

        #last-updated { margin-top: 20px; font-size: 12px; color: #94a3b8; }
        .custom-tooltip { background-color: var(--dark-grey); color: white; border: none; border-radius: 4px; padding: 5px 10px; }
    </style>
</head>
<body>

    <h1>Toppturer rundt Tromsø</h1>

    <div id="buttons">
        <select id="mapSelect" class="map-selector">
            <option value="norge">Kun Norgeskart</option>
            <option value="varsom">Bratthetskart (Varsom.no)</option>
            <option value="osm">OpenStreetMap</option>
        </select>
        <button id="resetBtn">Tilbake til oversikt</button>
    </div>

    <div id="map-container">
        <div id="map"></div>
        <a id="insta-overlay-btn" href="#" target="_blank">Se video</a>
    </div>

    <div id="legend">
        <div class="legend-item"><div class="box" style="background: #ffff00;"></div> 30-35°</div>
        <div class="legend-item"><div class="box" style="background: #ffaa00;"></div> 35-40°</div>
        <div class="legend-item"><div class="box" style="background: #ff0000;"></div> 40-45°</div>
        <div class="legend-item"><div class="box" style="background: #aa0000;"></div> 45-50°</div>
        <div class="legend-item"><div class="box" style="background: #000000;"></div> >50°</div>
    </div>

    <div id="last-updated"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>

    <script>
        document.getElementById('last-updated').innerHTML = "Sist oppdatert: " + new Date(document.lastModified).toLocaleString('no-NO');

        const map = L.map('map').setView([69.65, 18.95], 10);
        const allTracksGroup = L.featureGroup().addTo(map);

        // 1. Grunnlag: Norgeskart
        const norgeLayer = L.tileLayer('https://cache.kartverket.no/v1/wmts/1.0.0/topo/default/webmercator/{z}/{y}/{x}.png', {
            attribution: '&copy; Kartverket'
        });

        // 2. Bratthetslag (NVE WMS - mest robust)
        const varsomBratthet = L.tileLayer.wms('https://gis3.nve.no/map/services/Bratthet/MapServer/WmsServer', {
            layers: 'Bratthet_snoskred',
            format: 'image/png',
            transparent: true,
            version: '1.3.0',
            opacity: 0.6,
            attribution: '&copy; NVE',
            crs: L.CRS.EPSG3857
        });

        const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OSM' });

        // START-TILSTAND: Kun norgeskart (uten bratthet)
        norgeLayer.addTo(map);

        document.getElementById('mapSelect').onchange = function() {
            map.removeLayer(osmLayer);
            map.removeLayer(norgeLayer);
            map.removeLayer(varsomBratthet);

            if (this.value === "osm") {
                osmLayer.addTo(map);
            } else if (this.value === "norge") {
                norgeLayer.addTo(map);
            } else if (this.value === "varsom") {
                norgeLayer.addTo(map);
                varsomBratthet.addTo(map);
                // Bratthet krever ofte et visst zoom-nivå for å vises tydelig
                if (map.getZoom() < 11) map.setZoom(12);
            }
        };

        const topper = [
            { navn: "Gråtinden 871", fil: "2026_04_06.gpx", video: "https://www.instagram.com/reel/DW1xhPniK_l/" },
            { navn: "Bentsjordtinden", fil: "2026_04_03.gpx", video: "https://www.instagram.com/barfotgimse/reel/DWr1QGKiLBC/" },
            { navn: "Rema (800) 1000", fil: "2026_03_28.gpx", video: "https://www.instagram.com/barfotgimse/reel/DWcV-W9iLB8/" }
        ];

        topper.forEach(topp => {
            const btn = document.createElement('button');
            btn.className = 'top-btn';
            btn.innerText = topp.navn;
            document.getElementById('buttons').appendChild(btn);

            new L.GPX(topp.fil, {
                async: true,
                marker_options: { startIconUrl: null, endIconUrl: null, shadowUrl: null },
                polyline_options: { color: 'var(--strava-orange)', weight: 5, opacity: 0.9 }
            }).on('loaded', function(e) {
                const layer = e.target;
                allTracksGroup.addLayer(layer);
                layer.bindTooltip(topp.navn, { sticky: true, className: 'custom-tooltip' });
                
                const activate = () => {
                    map.flyToBounds(layer.getBounds(), { padding: [50, 50] });
                    document.getElementById('insta-overlay-btn').href = topp.video;
                    document.getElementById('insta-overlay-btn').style.display = 'block';
                };
                layer.on('click', activate);
                btn.onclick = activate;

                // AUTO-ZOOM TIL OVERSIKT når sporene er lastet
                map.fitBounds(allTracksGroup.getBounds(), { padding: [40, 40] });
            });
        });

        document.getElementById('resetBtn').onclick = () => {
            if (allTracksGroup.getLayers().length > 0) {
                map.flyToBounds(allTracksGroup.getBounds(), { padding: [40, 40], duration: 1.5 });
            }
            document.getElementById('insta-overlay-btn').style.display = 'none';
        };
    </script>
</body>
</html>
