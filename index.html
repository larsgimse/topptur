<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toppturer og Fjellturer</title>
    <style>
        :root {
            --winter-blue: #0ea5e9;
            --winter-dark: #0369a1;
            --summer-green: #22c55e;
            --summer-dark: #15803d;
            --bg-color: #f1f5f9;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            color: #1e293b;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .btn {
            display: block;
            padding: 20px 30px;
            font-size: 18px;
            font-weight: 700;
            text-decoration: none;
            color: white;
            border-radius: 15px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            border: none;
        }

        .btn:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        .btn-winter {
            background: linear-gradient(135deg, var(--winter-blue), var(--winter-dark));
            border-bottom: 4px solid #075985;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .btn-summer {
            background: linear-gradient(135deg, var(--summer-green), var(--summer-dark));
            border-bottom: 4px solid #166534;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        /* Mobil-tilpasning */
        @media (max-width: 480px) {
            h1 {
                font-size: 24px;
            }
            .btn {
                padding: 18px 20px;
                font-size: 17px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Velg sesong</h1>
        
        <a href="vinter.html" class="btn btn-winter">
            Toppturer vinter ⛷️
        </a>

        <a href="sommer.html" class="btn btn-summer">
            Fjellturer sommer ⛰️
        </a>
    </div>

</body>
</html>
