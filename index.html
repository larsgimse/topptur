<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Toppturer Tromsø</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; }
        #map { height: 600px; width: 100%; border-radius: 10px; background: #eee; }
        .controls { margin-bottom: 15px; display: flex; gap: 10px; justify-content: center; }
        #last-updated { margin-top: 15px; font-size: 12px; color: gray; }
        .legend { background: white; padding: 10px; border-radius: 5px; display: inline-flex; gap: 10px; margin-top: 10px; font-size: 12px; border: 1px solid #ccc; }
        .box { width: 15px; height: 15px; display: inline-block; border: 1px solid #000; }
    </style>
</head>
<body>

    <div class="controls">
        <select id="layerSelect" style="padding: 10px; font-weight: bold;">
            <option value="topo">Kun Norgeskart</option>
            <option value="bratthet">Norgeskart + Bratthet (NVE)</option>
        </select>
        <button id="resetBtn" style="padding: 10px;">Vis alle spor</button>
    </div>

    <div id="map"></div>

    <div class="legend">
        <strong>Bratthet:</strong>
        <span><div class="box" style="background: #ffff00;"></div> 30-35°</span>
        <span><div class="box" style="background: #ffaa00;"></div> 35-40°</span>
        <span><div class="box" style="background: #ff0000;"></div> 40-45°</span>
        <span><div class="box" style="background: #aa0000;"></div> 45-50°</span>
        <span><div class="box" style="background: #000000;"></div> >50°</span>
    </div>

    <div id="last-updated"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>

    <script>
        document.getElementById('last-updated').innerHTML = "Sist oppdatert: " + new Date(document.lastModified).toLocaleString('no-NO');

        const map = L.map('map').setView([69.65, 18.95], 11);
        const tracks = L.featureGroup().addTo(map);

        // 1. Norgeskart
        const topo = L.tileLayer('https://cache.kartverket.no/v1/wmts/1.0.0/topo/default/webmercator/{z}/{y}/{x}.png', {
            attribution: 'Kartverket'
        }).addTo(map);

        // 2. Bratthetskart (Bruker ArcGIS REST API som er mer stabilt enn WMTS i Leaflet)
        const bratthet = L.tileLayer.wms('https://gis3.nve.no/map/services/Bratthet/MapServer/WmsServer', {
            layers: 'Bratthet_snoskred',
            format: 'image/png',
            transparent: true,
            version: '1.3.0',
            opacity: 0.6,
            zIndex: 500
        });

        // Kontroll av lag
        document.getElementById('layerSelect').onchange = function() {
            if (this.value === 'bratthet') {
                bratthet.addTo(map);
                if (map.getZoom() < 11) map.setZoom(12); // Tvinger zoom inn for å se laget
            } else {
                map.removeLayer(bratthet);
            }
        };

        // Last inn GPX (Eksempel)
        const gpxFiles = ['2026_04_06.gpx', '2026_04_03.gpx', '2026_03_28.gpx'];
        gpxFiles.forEach(file => {
            new L.GPX(file, {
                async: true,
                marker_options: { startIconUrl: null, endIconUrl: null, shadowUrl: null },
                polyline_options: { color: '#fc4c02', weight: 5 }
            }).on('loaded', function(e) {
                tracks.addLayer(e.target);
                map.fitBounds(tracks.getBounds(), {padding: [50,50]});
            }).addTo(map);
        });

        document.getElementById('resetBtn').onclick = () => map.fitBounds(tracks.getBounds());
    </script>
</body>
</html>
