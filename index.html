<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toppturer Tromsø - Skredkart</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --strava-orange: #fc4c02;
            --insta-pink: #e1306c;
            --dark-grey: #2c3e50;
        }

        body { font-family: sans-serif; text-align: center; margin: 0; padding: 20px; background: #f1f5f9; }
        #buttons { margin-bottom: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        
        .map-selector { padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; border: 2px solid var(--dark-grey); }
        .top-btn { background: var(--strava-orange); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #resetBtn { background: var(--dark-grey); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; }

        #map-container { position: relative; max-width: 1100px; margin: 0 auto; }
        #map { height: 600px; width: 100%; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); background: #eee; }

        #legend { margin-top: 15px; display: inline-flex; gap: 15px; font-size: 12px; background: white; padding: 10px; border-radius: 8px; }
        .box { width: 15px; height: 15px; border: 1px solid #000; display: inline-block; vertical-align: middle; margin-right: 5px; }
        #last-updated { margin-top: 20px; font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>

    <h1>Toppturer rundt Tromsø</h1>

    <div id="buttons">
        <select id="mapSelect" class="map-selector">
            <option value="bratthet">Bratthetskart (Vinter)</option>
            <option value="norge">Vanlig Norgeskart</option>
            <option value="osm">OpenStreetMap</option>
        </select>
        <button id="resetBtn">Tilbake til oversikt</button>
    </div>

    <div id="map-container">
        <div id="map"></div>
    </div>

    <div id="legend">
        <strong>Bratthet:</strong>
        <span><div class="box" style="background: #ffff00;"></div> 30-35°</span>
        <span><div class="box" style="background: #ffaa00;"></div> 35-40°</span>
        <span><div class="box" style="background: #ff0000;"></div> 40-45°</span>
        <span><div class="box" style="background: #aa0000;"></div> 45-90°</span>
    </div>

    <div id="last-updated"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>

    <script>
        document.getElementById('last-updated').innerHTML = "Sist oppdatert: " + new Date(document.lastModified).toLocaleString('no-NO');

        const map = L.map('map').setView([69.65, 18.95], 11);
        const allTracksGroup = L.featureGroup().addTo(map);

        // LAG 1: Norgeskart (Bunn)
        const topo = L.tileLayer('https://cache.kartverket.no/v1/wmts/1.0.0/topo/default/webmercator/{z}/{y}/{x}.png', {
            attribution: '&copy; Kartverket'
        });

        // LAG 2: Bratthet (Overlegg)
        const slope = L.tileLayer('https://cache.kartverket.no/v1/wmts/1.0.0/slope/default/webmercator/{z}/{y}/{x}.png', {
            attribution: '&copy; Kartverket',
            opacity: 0.5,
            zIndex: 500
        });

        // LAG 3: OpenStreetMap
        const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OSM' });

        // Start med begge aktive
        topo.addTo(map);
        slope.addTo(map);

        // Veksle mellom lagene
        document.getElementById('mapSelect').onchange = function() {
            map.removeLayer(topo);
            map.removeLayer(slope);
            map.removeLayer(osm);

            if (this.value === "bratthet") {
                topo.addTo(map);
                slope.addTo(map);
            } else if (this.value === "norge") {
                topo.addTo(map);
            } else {
                osm.addTo(map);
            }
        };

        const topper = [
            { navn: "Gråtinden 871", fil: "2026_04_06.gpx" },
            { navn: "Bentsjordtinden", fil: "2026_04_03.gpx" },
            { navn: "Rema (800) 1000", fil: "2026_03_28.gpx" }
        ];

        topper.forEach(topp => {
            const btn = document.createElement('button');
            btn.className = 'top-btn';
            btn.innerText = topp.navn;
            document.getElementById('buttons').appendChild(btn);

            new L.GPX(topp.fil, {
                async: true,
                marker_options: { startIconUrl: null, endIconUrl: null, shadowUrl: null },
                polyline_options: { color: 'var(--strava-orange)', weight: 5, zIndex: 1000 }
            }).on('loaded', function(e) {
                const layer = e.target;
                allTracksGroup.addLayer(layer);
                btn.onclick = () => map.flyToBounds(layer.getBounds(), { padding: [50, 50] });
            }).addTo(map);
        });

        document.getElementById('resetBtn').onclick = () => {
            if (allTracksGroup.getLayers().length > 0) map.flyToBounds(allTracksGroup.getBounds());
        };
    </script>
</body>
</html>
