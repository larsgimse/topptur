<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toppturer rundt Tromsø</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --strava-orange: #fc4c02;
            --strava-blue: #0076ff;
            --insta-pink: #e1306c;
            --youtube-red: #ff0000;
            --dark-grey: #2c3e50;
            --new-green: #22c55e;
            --year-grey: #64748b;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            text-align: center; margin: 0; padding: 20px 10px; 
            background: #f8fafc; color: var(--dark-grey);
        }

        h1 { margin-bottom: 5px; font-size: 1.8rem; }
        .subtitle { margin-bottom: 25px; font-size: 1rem; color: #64748b; }

        #buttons { margin-bottom: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        
        .map-selector { padding: 10px; border-radius: 8px; border: 2px solid var(--dark-grey); font-weight: 600; cursor: pointer; }

        .top-btn { 
            position: relative; background: var(--strava-orange); color: white; border: none; 
            border-radius: 8px; padding: 12px 18px; cursor: pointer; font-weight: 600; font-size: 14px;
            transition: transform 0.1s;
        }
        .top-btn:active { transform: scale(0.95); }

        /* Badges */
        .badge {
            position: absolute; top: -8px; right: -8px; color: white; font-size: 10px;
            padding: 2px 6px; border-radius: 10px; border: 2px solid white; font-weight: bold; z-index: 10;
        }
        .badge-new { background: var(--new-green); animation: pulse 2s infinite; }
        .badge-year { background: var(--year-grey); }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        #resetBtn { background: var(--dark-grey); color: white; border: none; border-radius: 8px; padding: 12px 18px; cursor: pointer; font-weight: 600; }

        #map-container { position: relative; max-width: 1100px; margin: 0 auto; }
        #map { 
            height: 70vh; width: 100%; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            background: #e5e7eb; /* Vises mens kartet laster */
        }

        #video-buttons-container {
            position: absolute; top: 15px; right: 15px; z-index: 1000;
            display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
        }

        .video-link-btn, .toggle-btn, .main-track-toggle {
            position: relative; background: white; padding: 8px 15px; border-radius: 50px; 
            font-weight: bold; text-decoration: none; font-size: 12px; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 2px solid #ddd;
        }
        .video-link-btn { border-color: var(--insta-pink); color: var(--insta-pink); }
        .toggle-btn { border-color: var(--strava-blue); color: var(--strava-blue); }
        .main-track-toggle { background: var(--dark-grey); color: white; border: none; }

        .elevation-popup { font-size: 12px; }
    </style>
</head>
<body>

    <h1>Toppturer rundt Tromsø</h1>
    <div class="subtitle">Klikk på en topp eller et spor for detaljer</div>

    <div id="buttons">
        <select id="mapSelect" class="map-selector">
            <option value="norge">Norgeskart</option>
            <option value="osm">OpenStreetMap</option>
        </select>
        <button id="resetBtn">Nullstill kart</button>
    </div>

    <div id="map-container">
        <div id="map"></div>
        <div id="video-buttons-container"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>

    <script>
        const map = L.map('map', { zoomSnap: 0.5 });
        const allTracksGroup = L.featureGroup().addTo(map);
        const videoContainer = document.getElementById('video-buttons-container');
        
        const norgeLayer = L.tileLayer('https://cache.kartverket.no/v1/wmts/1.0.0/topo/default/webmercator/{z}/{y}/{x}.png', { attribution: '&copy; Kartverket' }).addTo(map);
        const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');

        document.getElementById('mapSelect').onchange = (e) => {
            if (e.target.value === "osm") { map.addLayer(osmLayer); map.removeLayer(norgeLayer); }
            else { map.addLayer(norgeLayer); map.removeLayer(osmLayer); }
        };

        const topper = [
            { navn: "884", fil: "2026_03_27.gpx", video: [{ url: "https://www.instagram.com/reel/DWg1TaHiJRJ/", tittel: "Video 1" }, { url: "https://www.instagram.com/reel/DTnrjgliITD/", tittel: "Video 2" }, { url: "https://www.instagram.com/p/DXFlkrDCLz1/", tittel: "Video 3" }], ekstraSpor: [{ fil: "2026_01_17.gpx", tittel: "Vis spor video 2", farge: "#6366f1" }, { fil: "2026_04_13.gpx", tittel: "Vis spor video 3", farge: "#00ced1" }] },
            { navn: "Bentsjordtinden", fil: "2026_04_03.gpx", video: [{ url: "https://www.instagram.com/barfotgimse/reel/DWr1QGKiLBC/", tittel: "Se video" }] },
            { navn: "Buren", fil: "2026_01_10.gpx", video: [{ url: "https://www.instagram.com/p/DTVY5yfCDfU/", tittel: "Video 1" }, { url: "https://www.instagram.com/p/DXCQalhiPgX/", tittel: "Video 2" }], ekstraSpor: [{ fil: "2026_04_12.gpx", tittel: "Vis spor video 2", farge: "#6366f1" }] },
            { navn: "Burshammeren", fil: "2026_03_26.gpx", video: [{ url: "https://www.instagram.com/reel/DWXPzaUiAO5/", tittel: "Video 1" }, { url: "https://www.instagram.com/reel/DTLiCcAiDMz/", tittel: "Video 2" }], ekstraSpor: [{ fil: "2025_12_31.gpx", tittel: "Vis spor video 2", farge: "#6366f1" }] },
            { navn: "Gabrielfjellet", fil: "2025_05_25.gpx", video: [{ url: "https://www.instagram.com/p/DKKd9vQsRke/", tittel: "Se video" }] },
            { navn: "Gorzelvtinden", fil: "2025_12_06.gpx", video: [{ url: "https://www.instagram.com/p/DR99FHAiF62/", tittel: "Se video" }] },
            { navn: "Gråtinden", fil: "2026_04_06.gpx", video: [{ url: "https://www.instagram.com/reel/DW1xhPniK_l/", tittel: "Se video" }] },
            { navn: "Langfjellaksla", fil: "2026_04_08.gpx", video: [{ url: "https://www.instagram.com/reel/DW4gus-iLa9/", tittel: "Se video" }] },
            { navn: "Middagstinden", fil: "2024_04_21.gpx", video: [{ url: "https://www.facebook.com/reel/398350683066500", tittel: "Se video (FB)" }] },
            { navn: "Rema 1000", fil: "2026_03_28.gpx", video: [{ url: "https://www.instagram.com/barfotgimse/reel/DWcV-W9iLB8/", tittel: "Se video" }] },
            { navn: "Skittentinden", fil: "2026_03_15.gpx", video: [{ url: "https://www.instagram.com/reel/DWHz3RbCPlU/", tittel: "Se video" }] },
            { navn: "Steinskartinden", fil: "2026_03_08.gpx", video: [{ url: "https://www.instagram.com/p/DVodnhniPMj/", tittel: "Se video" }] },
            { navn: "Storstolpan", fil: "2025_05_08.gpx", video: [{ url: "https://www.instagram.com/p/DJjsfOesdWS/", tittel: "Se video" }] },
            { navn: "Stortinden", fil: "2024_03_26.gpx", video: [{ url: "https://www.youtube.com/watch?v=wix86hamTQ8", tittel: "Se video (YT)" }] },
            { navn: "Straumsaksla", fil: "2025_05_24.gpx", video: [{ url: "https://www.instagram.com/p/DKDbUavsE9v/", tittel: "Se video" }] }
        ];

        // Finn nyeste fil for NY-merke
        let gpxDatoer = [];
        topper.forEach(t => { 
            gpxDatoer.push(t.fil); 
            if(t.ekstraSpor) t.ekstraSpor.forEach(e => gpxDatoer.push(e.fil));
        });
        const nyesteGpx = gpxDatoer.sort().reverse()[0];

        function lagBadge(fil) {
            const span = document.createElement('span');
            if (fil === nyesteGpx) { span.className = 'badge badge-new'; span.innerText = 'NY'; }
            else { span.className = 'badge badge-year'; span.innerText = fil.split('_')[0]; }
            return span;
        }

        topper.sort((a,b) => a.navn.localeCompare(b.navn)).forEach(topp => {
            const btn = document.createElement('button');
            btn.className = 'top-btn'; btn.innerText = topp.navn;
            
            // Sjekk om toppen har NY-merke
            const harNy = (topp.fil === nyesteGpx) || (topp.ekstraSpor && topp.ekstraSpor.some(e => e.fil === nyesteGpx));
            if(harNy) btn.appendChild(lagBadge(nyesteGpx));
            document.getElementById('buttons').appendChild(btn);

            const gpx = new L.GPX(topp.fil, {
                async: true,
                marker_options: { startIconUrl: null, endIconUrl: null, shadowUrl: null },
                polyline_options: { color: 'var(--strava-orange)', weight: 3, opacity: 0.7 }
            }).on('loaded', (e) => {
                const layer = e.target;
                allTracksGroup.addLayer(layer);

                const visInfo = (latlng) => {
                    allTracksGroup.eachLayer(l => l.setStyle({opacity: 0.3, weight: 2}));
                    layer.setStyle({opacity: 1, weight: 5}).bringToFront();
                    
                    videoContainer.innerHTML = '';
                    
                    // Bryter
                    const tgl = document.createElement('button');
                    tgl.className = 'main-track-toggle'; tgl.innerText = 'Skjul spor';
                    tgl.onclick = () => map.hasLayer(layer) ? map.removeLayer(layer) : map.addLayer(layer);
                    videoContainer.appendChild(tgl);

                    // Videoer
                    topp.video.forEach((v, i) => {
                        const a = document.createElement('a');
                        a.href = v.url; a.target = "_blank"; a.className = 'video-link-btn'; a.innerText = v.tittel;
                        const tilhorendeFil = (i > 0 && topp.ekstraSpor && topp.ekstraSpor[i-1]) ? topp.ekstraSpor[i-1].fil : topp.fil;
                        a.appendChild(lagBadge(tilhorendeFil));
                        videoContainer.appendChild(a);
                    });

                    // Ekstraspor
                    if(topp.ekstraSpor) {
                        topp.ekstraSpor.forEach(es => {
                            const eb = document.createElement('button');
                            eb.className = 'toggle-btn'; eb.innerText = es.tittel;
                            eb.appendChild(lagBadge(es.fil));
                            let esL = null;
                            eb.onclick = () => {
                                if(esL) { map.removeLayer(esL); esL = null; }
                                else { esL = new L.GPX(es.fil, { async: true, marker_options: { startIconUrl: null, endIconUrl: null, shadowUrl: null }, polyline_options: { color: es.farge, weight: 3, dashArray: '5,5' }}).addTo(map); }
                            };
                            videoContainer.appendChild(eb);
                        });
                    }
                    map.flyToBounds(layer.getBounds(), { padding: [50, 50] });
                };

                layer.on('click', (ev) => visInfo(ev.latlng));
                btn.onclick = () => visInfo();
                
                if (allTracksGroup.getLayers().length === topper.length) map.fitBounds(allTracksGroup.getBounds());
            });
        });

        document.getElementById('resetBtn').onclick = () => {
            allTracksGroup.eachLayer(l => { if(!map.hasLayer(l)) map.addLayer(l); l.setStyle({opacity: 0.7, weight: 3}); });
            videoContainer.innerHTML = '';
            map.fitBounds(allTracksGroup.getBounds());
        };
    </script>
</body>
</html>
