<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toppturer og Fjellturer</title>
    <style>
        :root {
            --winter-blue: #0ea5e9;
            --winter-dark: #0369a1;
            --summer-green: #22c55e;
            --summer-dark: #15803d;
            --bg-color: #f1f5f9;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            /* Fjernet align-items: center for å løfte innholdet */
            min-height: 100vh;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center; /* Sentrerer elementene horisontalt */
            gap: 25px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            margin-top: 10vh; /* Flytter containeren til øvre del av skjermen */
        }

        h1 {
            color: #1e293b;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .btn {
            display: flex; /* Endret til flex for å sentrere tekst og emoji */
            flex-direction: column; /* Tekst over emoji */
            justify-content: center; /* Sentrerer vertikalt */
            align-items: center; /* Sentrerer horisontalt */
            padding: 0; /* Fjernet padding, bruker width/height */
            
            /* Gjør knappene kvadratiske */
            width: 180px; 
            height: 180px;
            
            font-size: 18px;
            font-weight: 700;
            text-decoration: none;
            color: white;
            border-radius: 15px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease, border-bottom-width 0.1s ease; /* Lagt til transition for border-bottom-width */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            border: none;
            box-sizing: border-box; /* Sørger for at padding og border er inkludert i bredden/høyden */
        }

        /* Spesifikk stil for emojiene inne i knappene */
        .btn span.emoji {
            font-size: 40px; /* Gjør emojiene større */
            margin-top: 10px;
        }

        .btn:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        /* 1. Lagt til "Active"-tilstand for "klikk-effekt" */
        .btn:active {
            transform: scale(0.98); /* Knappen blir litt mindre */
            border-bottom-width: 0;  /* "Skyggen" forsvinner */
            margin-top: 4px;         /* Flytter knappen ned */
        }

        /* 2. Lagt til "Focus"-tilstand for tilgjengelighet */
        .btn:focus {
            outline: 3px solid #94a3b8;
            outline-offset: 4px;
        }

        .btn-winter {
            background: linear-gradient(135deg, var(--winter-blue), var(--winter-dark));
            border-bottom: 4px solid #075985;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .btn-summer {
            background: linear-gradient(135deg, var(--summer-green), var(--summer-dark));
            border-bottom: 4px solid #166534;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        /* Mobil-tilpasning */
        @media (max-width: 480px) {
            h1 {
                font-size: 24px;
            }
            .btn {
                /* Litt mindre knapper på mobil */
                width: 150px;
                height: 150px;
                font-size: 16px;
            }
            .btn span.emoji {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Velg sesong</h1>
        
        <a href="vinter.html" class="btn btn-winter">
            <span>Toppturer vinter</span>
            <span class="emoji">⛷️</span>
        </a>

        <a href="sommer.html" class="btn btn-summer">
            <span>Fjellturer sommer</span>
            <span class="emoji">⛰️</span>
        </a>
    </div>

</body>
</html>
